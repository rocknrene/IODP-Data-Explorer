on:
  push:
    branches:
      - main

jobs:
  sync-to-huggingface:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_IDE_TOKEN }}
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git push https://rocknrene:$HF_TOKEN@huggingface.co/spaces/rocknrene/IODP-Data-Explorer main --force
